<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Hilal Browser | Developer Arena</title>
    <link rel="icon" type="image/png" href="https://hilal.gkdevstudio.org/default128.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dev: {
                            bg: '#090d13',
                            panel: '#0d1117',
                            surface: '#161b22',
                            border: '#30363d',
                            text: '#c9d1d9',
                            muted: '#8b949e',
                            white: '#f0f6fc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border: 2px solid #30363d;
            border-top: 2px solid var(--accent-color, #58a6ff);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-dev-bg text-dev-text antialiased max-w-[1250px] mx-auto px-6 py-8 tracking-tight font-mono relative">

    <header class="flex items-center justify-between border-b border-dev-border pb-5 mb-8">
        <div class="flex items-center gap-3">
            <img src="https://hilal.gkdevstudio.org/default128.png" alt="Logo" class="w-7 h-7 object-contain opacity-90">
            <span class="text-dev-white text-lg font-semibold tracking-normal font-sans">Hilal Browser / dev-center</span>
        </div>
        
        <div class="flex items-center gap-4 font-sans relative">
            <a href="https://github.com/VastSea0/hilal-browser" target="_blank" rel="noopener noreferrer" class="hidden sm:flex items-center gap-2 border border-dev-border px-3 py-1 rounded bg-dev-panel hover:bg-dev-surface hover:text-dev-white transition-colors text-xs">
                <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16" version="1.1" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8 0 3.54-2.29 6.53-5.47 7.59-.4.07-.55-.17-.55-.38 0-.19.01-.82.01-1.49 2.01.37 2.53-.49 2.69-.94.09-.23.48-.94.82-1.13.28-.15.68-.52.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                <span>VastSea0/hilal-browser</span>
                <span class="text-dev-muted font-mono text-[10px] bg-dev-bg px-1 rounded border border-dev-border">v1.0.0</span>
            </a>

            <div id="auth-container" class="relative">
                <div id="auth-zone"></div>
                
                <div id="stats-popup" class="hidden absolute right-0 mt-2 w-64 bg-dev-panel border border-dev-border rounded-md shadow-2xl z-50 p-4 animate-in fade-in slide-in-from-top-1 duration-150">
                    <div class="text-[11px] font-bold text-dev-muted uppercase tracking-wider border-b border-dev-border pb-2 mb-3">
                        Geliştirici Profil Özeti
                    </div>
                    <div class="space-y-2.5 text-xs">
                        <div class="flex justify-between items-center">
                            <span class="text-dev-muted">Katkılar (Commits)</span>
                            <span class="text-dev-white font-semibold font-mono">142</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-dev-muted">Açılan Sorunlar (Issues)</span>
                            <span class="text-dev-white font-semibold font-mono">12</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-dev-muted">Yama İncelemeleri</span>
                            <span class="text-dev-white font-semibold font-mono">34</span>
                        </div>
                        <div class="border-t border-dev-border pt-2.5 mt-1 flex justify-between items-center text-[11px]">
                            <span class="text-dev-muted">Rol</span>
                            <span class="text-sky-400 font-mono bg-sky-500/10 px-1.5 py-0.5 rounded border border-sky-500/20">Core Dev</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-[260px_1fr] gap-8 items-start">
        
        <nav class="space-y-6 md:sticky md:top-6 select-none font-sans">
            <div>
                <div class="text-[11px] font-bold text-dev-muted uppercase tracking-wider px-3 mb-2">Workspace</div>
                <div class="space-y-0.5" id="workspace-menu"></div>
            </div>
            
            <div>
                <div class="text-[11px] font-bold text-dev-muted uppercase tracking-wider px-3 mb-2">Feedback</div>
                <div class="space-y-0.5" id="feedback-menu"></div>
            </div>
        </nav>

        <main class="bg-dev-panel border border-dev-border rounded-lg shadow-xl relative min-w-0 transition-all duration-200">
            <div id="accent-line" class="absolute left-0 top-0 bottom-0 w-[3px] transition-colors duration-300"></div>

            <div class="p-6 md:p-8">
                <div class="border-b border-dev-border pb-6 mb-6">
                    <h2 id="kategoriBaslik" class="text-dev-white text-xl font-medium mb-1.5 font-sans tracking-normal"></h2>
                    <p id="kategoriDetay" class="text-dev-muted text-xs leading-relaxed max-w-3xl font-sans"></p>
                </div>

                <div id="giscus-wrapper" class="relative min-h-[350px]">
                    <div id="giscus-loading-indicator" class="absolute inset-0 flex flex-col items-center justify-center bg-dev-panel gap-3 text-xs text-dev-muted font-sans z-10">
                        <div class="loader"></div>
                        <span>syncing discussions...</span>
                    </div>
                    <div id="giscus-forum-kutusu"></div>
                </div>
            </div>
        </main>

    </div>

    <script>
        // --- DİNAMİK AUTH YAPISI (GISCUS ENTEGRASYONU) ---
        let userState = {
            isLoggedIn: false,
            username: '',
            avatar: ''
        };

        // Giscus iframe'inden gelen oturum sinyallerini dinleyen event listener
        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://giscus.app') return;
            
            const data = event.data;
            if (data && data.giscus && data.giscus.viewer) {
                const viewer = data.giscus.viewer;
                
                // Giscus'ta aktif oturum varsa bilgileri f5'siz çek
                userState.isLoggedIn = true;
                userState.username = viewer.login;
                userState.avatar = viewer.avatarUrl;
                
                renderAuth();
            }
        });

        // Kategori Veri Kümesi
        const kategoriBilgileri = {
            'patch-manager': { 
                baslik: 'Yama Yöneticisi', 
                badge: 'hil',
                group: 'workspace',
                detay: 'Rust tabanlı patch yöneticisi mimarisi, manifest.toml validasyon kuralları ve core operations (setup, apply, refresh) süreçleri.',
                term: 'hilal-browser-patch-manager-hil',
                color: '#38bdf8'
            },
            'upstream-engine': { 
                baslik: 'Firefox Tabanı', 
                badge: 'core',
                group: 'workspace',
                detay: 'Upstream Firefox kod tabanı senkronizasyonu, upstream.lock kilit mekanizmaları, mach komut dizilimleri ve motor optimizasyonları.',
                term: 'hilal-browser-upstream-engine-firefox',
                color: '#f97316'
            },
            'changes-overlays': { 
                baslik: 'Değişiklikler & Katmanlar', 
                badge: 'changes/',
                group: 'workspace',
                detay: 'Firefox kaynak ağacını aynalayan *.patch entegrasyonları, özelleştirilmiş branding yapılandırması ve kullanıcı tercihleri.',
                term: 'hilal-browser-changes-overlays',
                color: '#a855f7'
            },
            'build-release': { 
                baslik: 'Derleme & Dağıtım', 
                badge: 'scripts/',
                group: 'workspace',
                detay: 'macOS (sh) ve Windows (ps1) derleme mimarileri, paketleme otomasyonları, CI/CD süreçleri ve sürüm yönetimi.',
                term: 'hilal-browser-build-release-pipeline',
                color: '#22c55e'
            },
            'issues': {
                baslik: 'Sorunlar & Hatalar',
                badge: 'bug',
                group: 'feedback',
                detay: 'Derleme süreçlerinde, yamaların enjeksiyonunda veya runtime esnasında karşılaşılan hata ve istisnaların takibi.',
                term: 'hilal-browser-community-issues',
                color: '#ef4444'
            },
            'suggestions': {
                baslik: 'Öneriler & Fikirler',
                badge: 'feature',
                group: 'feedback',
                detay: 'Tarayıcı kabiliyetlerini artıracak yeni özellik önerileri ve yama yönetim motoruna dair optimizasyon fikirleri.',
                term: 'hilal-browser-community-suggestions',
                color: '#eab308'
            }
        };

        const workspaceMenu = document.getElementById('workspace-menu');
        const feedbackMenu = document.getElementById('feedback-menu');
        const accentLine = document.getElementById('accent-line');
        const loadingIndicator = document.getElementById('giscus-loading-indicator');
        const authZone = document.getElementById('auth-zone');
        const statsPopup = document.getElementById('stats-popup');

        // Auth Alanı Arayüz Yönetimi
        function renderAuth() {
            if (userState.isLoggedIn) {
                authZone.innerHTML = `
                    <button id="profile-trigger" class="flex items-center gap-2.5 border border-dev-border pl-2.5 pr-1 py-1 rounded bg-dev-panel hover:bg-dev-surface transition-colors cursor-pointer select-none">
                        <span class="text-xs font-medium text-dev-white font-mono">${userState.username}</span>
                        <img src="${userState.avatar}" alt="Profil" class="w-6 h-6 rounded border border-dev-border object-cover">
                    </button>
                `;

                document.getElementById('profile-trigger').addEventListener('click', (e) => {
                    e.stopPropagation();
                    statsPopup.classList.toggle('hidden');
                });
            } else {
                authZone.innerHTML = `
                    <a href="#giscus-forum-kutusu" class="flex items-center gap-2 bg-[#24292e] text-white hover:bg-[#2c3137] border border-dev-border px-3 py-1 rounded text-xs transition-colors font-medium text-none decoration-none">
                        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8 0 3.54-2.29 6.53-5.47 7.59-.4.07-.55-.17-.55-.38 0-.19.01-.82.01-1.49 2.01.37 2.53-.49 2.69-.94.09-.23.48-.94.82-1.13.28-.15.68-.52.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                        <span>Tartışmaya Katıl</span>
                    </a>
                `;
            }
        }

        // Dropdown dışına tıklandığında pop-up kapatma
        document.addEventListener('click', (e) => {
            if (!statsPopup.contains(e.target) && e.target.id !== 'profile-trigger') {
                statsPopup.classList.add('hidden');
            }
        });

        // Menü Yapılandırması
        function menuRender() {
            workspaceMenu.innerHTML = '';
            feedbackMenu.innerHTML = '';
            
            Object.keys(kategoriBilgileri).forEach(key => {
                const item = kategoriBilgileri[key];
                const link = document.createElement('a');
                link.href = `?kategori=${key}`;
                link.className = `group flex items-center justify-between px-3 py-2 rounded text-xs transition-all duration-150 cursor-pointer text-dev-muted hover:bg-dev-surface hover:text-dev-white`;
                link.id = `link-${key}`;
                
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.history.pushState(null, '', link.href);
                    switchCategory(key);
                });

                let badgeHtml = item.badge ? `<span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-dev-surface border border-dev-border group-hover:border-dev-muted text-dev-muted transition-colors">${item.badge}</span>` : '';
                link.innerHTML = `<span>${item.baslik}</span>${badgeHtml}`;

                if (item.group === 'workspace') workspaceMenu.appendChild(link);
                else feedbackMenu.appendChild(link);
            });
        }

        // Kategori Senkronizasyonu (SPA - F5'siz Alan)
        function switchCategory(kategoriKey) {
            let key = kategoriBilgileri[kategoriKey] ? kategoriKey : 'patch-manager';
            const data = kategoriBilgileri[key];

            document.querySelectorAll('nav a').forEach(el => {
                el.classList.remove('bg-dev-surface', 'text-dev-white', 'font-medium', 'border-l-2');
                el.style.borderLeftColor = 'transparent';
            });
            
            const activeLink = document.getElementById(`link-${key}`);
            if(activeLink) {
                activeLink.classList.add('bg-dev-surface', 'text-dev-white', 'font-medium');
                activeLink.style.borderLeft = `2px solid ${data.color}`;
            }

            document.getElementById('kategoriBaslik').innerText = data.baslik;
            document.getElementById('kategoriDetay').innerText = data.detay;
            accentLine.style.backgroundColor = data.color;
            document.documentElement.style.setProperty('--accent-color', data.color);

            reloadGiscus(data.term);
        }

        // Giscus Reload Core
        function reloadGiscus(term) {
            const container = document.getElementById('giscus-forum-kutusu');
            container.innerHTML = '';
            loadingIndicator.style.display = 'flex';

            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            script.setAttribute("data-repo", "Sxinar/hilal-browser");
            script.setAttribute("data-repo-id", "R_kgDOSxZJ7g");
            script.setAttribute("data-category-id", "DIC_kwDOSxZJ7s4C_GO8");
            script.setAttribute("data-mapping", "specific");
            script.setAttribute("data-term", term); 
            script.setAttribute("data-strict", "0");
            script.setAttribute("data-reactions-enabled", "1");
            script.setAttribute("data-emit-metadata", "0");
            script.setAttribute("data-input-position", "top");
            script.setAttribute("data-theme", "dark_dimmed");
            script.setAttribute("data-lang", "tr");
            script.crossOrigin = "anonymous";
            script.async = true;

            script.onload = () => {
                setTimeout(() => { loadingIndicator.style.display = 'none'; }, 400);
            };

            container.appendChild(script);
        }

        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            switchCategory(params.get('kategori'));
        });

        // Bootstrap
        renderAuth();
        menuRender();
        const initialParams = new URLSearchParams(window.location.search);
        switchCategory(initialParams.get('kategori'));
    </script>
</body>
</html>
